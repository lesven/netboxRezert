<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}NetBox Product-Owner-Rezertifizierung{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="app-header">
    <svg class="brand-icon" width="28" height="28" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
         aria-hidden="true">
      <rect x="3" y="4" width="18" height="6" rx="1.5"></rect>
      <rect x="3" y="14" width="18" height="6" rx="1.5"></rect>
      <circle cx="7" cy="7" r="0.6" fill="currentColor" stroke="none"></circle>
      <circle cx="7" cy="17" r="0.6" fill="currentColor" stroke="none"></circle>
    </svg>
    <h1>NetBox Product-Owner-Rezertifizierung</h1>
  </header>
  <div class="page">
    <main>
      {% block content %}{% endblock %}
    </main>
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
